<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>虛擬封鎖線：AI 叛亂</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            border: 2px solid rgba(0, 255, 0, 0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            color: white; display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; text-align: center;
        }
        .hp-container { width: 200px; height: 15px; background: #444; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #00ff00; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1 style="color: #ffcc00; font-size: 40px;">VIRTUAL BLOCKADE</h1>
        <p>這不是練習，AI 已經接管了虛擬空間</p>
        <p>WASD: 移動 | 滑鼠: 瞄準射擊 | Shift: 衝刺</p>
        <button id="start-btn" style="padding: 15px 40px; font-size: 20px; cursor: pointer;">開始協議</button>
    </div>
    
    <div id="crosshair"></div>
    <div id="ui">
        <div>STATUS: <span id="status" style="color:#00ff00">ACTIVE</span></div>
        <div class="hp-container"><div id="hp-fill"></div></div>
        <p>擊毀數: <span id="kills">0</span></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, player;
        let bots = [], bullets = [];
        let move = { f: false, b: false, l: false, r: false, sprint: false };
        let kills = 0, health = 100;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xaaaaaa); // 模擬 Roblox 的預設天空感
            scene.fog = new THREE.Fog(0xaaaaaa, 20, 300);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 光源
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x666666));

            // 地板
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // 生成仿真假人 (Bots)
            for(let i=0; i<15; i++) spawnBot();

            clock = new THREE.Clock();
            animate();
        }

        function createBotBody() {
            const group = new THREE.Group();
            // 頭
            const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            head.position.y = 4.2;
            group.add(head);
            // 身體 (Roblox 風格方塊人)
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 1), new THREE.MeshPhongMaterial({color: 0x3d5afe}));
            torso.position.y = 2.7;
            group.add(torso);
            // 手腳
            const limbGeo = new THREE.BoxGeometry(0.8, 2, 0.8);
            const limbMat = new THREE.MeshPhongMaterial({color: 0x3d5afe});
            const lArm = new THREE.Mesh(limbGeo, limbMat); lArm.position.set(-1.5, 2.7, 0); group.add(lArm);
            const rArm = new THREE.Mesh(limbGeo, limbMat); rArm.position.set(1.5, 2.7, 0); group.add(rArm);
            const lLeg = new THREE.Mesh(limbGeo, limbMat); lLeg.position.set(-0.5, 0.8, 0); group.add(lLeg);
            const rLeg = new THREE.Mesh(limbGeo, limbMat); rLeg.position.set(0.5, 0.8, 0); group.add(rLeg);

            return group;
        }

        function spawnBot() {
            const bot = createBotBody();
            bot.position.set((Math.random()-0.5)*200, 0, (Math.random()-0.5)*200);
            bot.userData = { 
                targetPos: new THREE.Vector3(bot.position.x, 0, bot.position.z),
                state: 'WANDER', // WANDER, CHASE
                timer: 0
            };
            scene.add(bot);
            bots.push(bot);
        }

        function shoot() {
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.userData = { vel: dir.multiplyScalar(2.5) };
            scene.add(bullet);
            bullets.push(bullet);
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('instructions').style.display = 'none';
            document.body.requestPointerLock();
            init();
        };

        window.addEventListener('keydown', e => { 
            if(e.code==='KeyW') move.f=true; if(e.code==='KeyS') move.b=true;
            if(e.code==='KeyA') move.l=true; if(e.code==='KeyD') move.r=true;
            if(e.shiftKey) move.sprint=true;
        });
        window.addEventListener('keyup', e => { 
            if(e.code==='KeyW') move.f=false; if(e.code==='KeyS') move.b=false;
            if(e.code==='KeyA') move.l=false; if(e.code==='KeyD') move.r=false;
            if(!e.shiftKey) move.sprint=false;
        });
        window.addEventListener('mousedown', () => { if(document.pointerLockElement) shoot(); });
        window.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 玩家移動
            const speed = (move.sprint ? 35 : 15) * delta;
            if(move.f) camera.translateZ(-speed); if(move.b) camera.translateZ(speed);
            if(move.l) camera.translateX(-speed); if(move.r) camera.translateX(speed);
            camera.position.y = 4.5;

            // 子彈物理
            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                bots.forEach((bot, bi) => {
                    if(b.position.distanceTo(bot.position.clone().add(new THREE.Vector3(0,3,0))) < 2) {
                        scene.remove(bot); bots.splice(bi, 1);
                        scene.remove(b); bullets.splice(i, 1);
                        kills++; document.getElementById('kills').innerText = kills;
                        spawnBot();
                    }
                });
            });

            // AI 假人行為邏輯
            bots.forEach(bot => {
                const distToPlayer = bot.position.distanceTo(camera.position);
                
                if(distToPlayer < 40) {
                    bot.userData.state = 'CHASE';
                    bot.lookAt(camera.position.x, 0, camera.position.z);
                    const dir = new THREE.Vector3().subVectors(camera.position, bot.position).normalize();
                    bot.position.add(dir.multiplyScalar(0.1));
                } else {
                    bot.userData.state = 'WANDER';
                    // 隨機漫步邏輯...
                    bot.rotation.y += 0.01;
                    bot.translateZ(0.05);
                }

                if(distToPlayer < 3) {
                    health -= 0.1;
                    document.getElementById('hp-fill').style.width = health + "%";
                    if(health <= 0) location.reload();
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
