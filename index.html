<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>虛空裂痕：引力核心 2.0</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; padding: 25px; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        #hp-container { top: 20px; left: 20px; width: 250px; }
        #hp-bg { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        #hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0055, #ff5e00); transition: 0.4s; }
        #score-box { top: 20px; right: 20px; text-align: right; font-size: 24px; color: #00d4ff; }
        
        #upgrade-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 100;
        }
        .card-wrap { display: flex; gap: 20px; margin-top: 30px; }
        .card { 
            width: 200px; padding: 20px; background: #111; border: 2px solid #444; 
            border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .card:hover { border-color: #00d4ff; transform: translateY(-10px); box-shadow: 0 0 30px #00d4ff66; }
        .card h3 { color: #00d4ff; margin: 0 0 10px 0; }
        
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto;
        }
        h1 { font-size: 70px; margin: 0; letter-spacing: 10px; color: #fff; text-shadow: 0 0 30px #00d4ff; }
        .btn { background: #00d4ff; border: none; color: #000; padding: 15px 60px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 40px; border-radius: 50px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
    <div id="hp-container" class="hud">
        <div id="hp-bg"><div id="hp-bar"></div></div>
        <div style="font-size: 12px; margin-top: 8px; letter-spacing: 2px;">CORE INTEGRITY</div>
    </div>
    <div id="score-box" class="hud">
        <span id="score-val">0</span><br>
        <small style="font-size: 14px; opacity: 0.7;">LEVEL <span id="lvl-val">1</span></small>
    </div>
    
    <div id="upgrade-overlay">
        <h2 style="font-size: 32px; color: #fff;">獲得裂痕能量：選擇進化路徑</h2>
        <div class="card-wrap" id="card-wrap"></div>
    </div>

    <div id="start-screen">
        <h1>VOID RIFT</h1>
        <p style="opacity: 0.6;">SURVIVE THE GRAVITY BENDING APOCALYPSE</p>
        <button class="btn" onclick="initGame()">啟動核心</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const scoreVal = document.getElementById('score-val');
const lvlVal = document.getElementById('lvl-val');
const upgradeOverlay = document.getElementById('upgrade-overlay');
const cardWrap = document.getElementById('card-wrap');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, bullets, enemies, particles;
let score = 0, level = 1, hp = 100, isPaused = false;
let spawnTimer = null;

const upgradeOptions = [
    { name: '多重脈衝', desc: '一次發射三枚子彈', action: () => { player.type = 'triple'; } },
    { name: '重力反彈', desc: '子彈撞牆會反彈次數+2', action: () => { player.bounces += 2; } },
    { name: '虛空穿透', desc: '子彈可穿透 2 個敵人', action: () => { player.pierce += 2; } },
    { name: '超載核心', desc: '射速大幅提升', action: () => { player.fireRate *= 0.5; } }
];

class Player {
    constructor() {
        this.x = canvas.width/2; this.y = canvas.height/2;
        this.type = 'single'; this.bounces = 1; this.pierce = 0;
        this.fireRate = 350; this.lastFire = 0;
        this.angle = 0;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.shadowBlur = 20; ctx.shadowColor = '#00d4ff';
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(25, 0); ctx.lineTo(-15, -18); ctx.lineTo(-15, 18);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, ang, b, p) {
        this.x = x; this.y = y;
        this.vx = Math.cos(ang) * 15; this.vy = Math.sin(ang) * 15;
        this.bounces = b; this.pierce = p;
        this.history = [];
    }
    update() {
        this.history.push({x: this.x, y: this.y});
        if(this.history.length > 5) this.history.shift();
        this.x += this.vx; this.y += this.vy;
        if(this.x < 0 || this.x > canvas.width) { this.vx *= -1; this.bounces--; }
        if(this.y < 0 || this.y > canvas.height) { this.vy *= -1; this.bounces--; }
    }
    draw() {
        ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 4;
        ctx.beginPath();
        this.history.forEach((pos, i) => {
            ctx.globalAlpha = i/5;
            i === 0 ? ctx.moveTo(pos.x, pos.y) : ctx.lineTo(pos.x, pos.y);
        });
        ctx.stroke();
        ctx.globalAlpha = 1;
    }
}

class Enemy {
    constructor() {
        const side = Math.floor(Math.random()*4);
        if(side===0){this.x=Math.random()*canvas.width; this.y=-50;}
        else if(side===1){this.x=canvas.width+50; this.y=Math.random()*canvas.height;}
        else if(side===2){this.x=Math.random()*canvas.width; this.y=canvas.height+50;}
        else {this.x=-50; this.y=Math.random()*canvas.height;}
        this.hp = Math.ceil(level/2);
        this.speed = 1.5 + (level * 0.3);
        this.color = `hsl(${Math.random()*50 + 280}, 80%, 60%)`;
        this.size = 20;
    }
    update() {
        let ang = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(ang) * this.speed;
        this.y += Math.sin(ang) * this.speed;
    }
    draw() {
        ctx.shadowBlur = 15; ctx.shadowColor = this.color;
        ctx.strokeStyle = this.color; ctx.lineWidth = 3;
        ctx.strokeRect(this.x-10, this.y-10, 20, 20);
    }
}

function spawnManager() {
    if(isPaused) return;
    enemies.push(new Enemy());
    // 確保 Timer 被正確重複觸發
    spawnTimer = setTimeout(spawnManager, Math.max(1500 - level*150, 400));
}

function triggerUpgrade() {
    isPaused = true;
    clearTimeout(spawnTimer); // 停止生成
    upgradeOverlay.style.display = 'flex';
    cardWrap.innerHTML = '';
    
    // 隨選三個升級
    [...upgradeOptions].sort(()=>0.5-Math.random()).slice(0,3).forEach(opt => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${opt.name}</h3><p>${opt.desc}</p>`;
        div.onclick = () => {
            opt.action();
            resumeGame();
        };
        cardWrap.appendChild(div);
    });
}

function resumeGame() {
    isPaused = false;
    upgradeOverlay.style.display = 'none';
    spawnManager(); // 重新開始生成敵人
    animate();      // 重新開始繪製循環
}

function initGame() {
    document.getElementById('start-screen').style.display = 'none';
    player = new Player();
    bullets = []; enemies = []; particles = [];
    score = 0; level = 1; hp = 100; isPaused = false;
    scoreVal.innerText = score; lvlVal.innerText = level;
    hpBar.style.width = '100%';
    spawnManager();
    animate();
}

function animate() {
    if(isPaused) return;
    ctx.fillStyle = 'rgba(2, 2, 5, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    player.draw();

    bullets.forEach((b, bi) => {
        b.update(); b.draw();
        if(b.bounces < 0) bullets.splice(bi, 1);
        enemies.forEach((e, ei) => {
            if(Math.hypot(b.x-e.x, b.y-e.y) < 20) {
                e.hp--;
                if(b.pierce <= 0) bullets.splice(bi, 1); else b.pierce--;
                if(e.hp <= 0) {
                    enemies.splice(ei, 1);
                    score += 10; scoreVal.innerText = score;
                    if(score > 0 && score % 100 === 0) {
                        level++; lvlVal.innerText = level;
                        triggerUpgrade();
                    }
                }
            }
        });
    });

    enemies.forEach((e, ei) => {
        e.update(); e.draw();
        if(Math.hypot(e.x-player.x, e.y-player.y) < 30) {
            hp -= 15; hpBar.style.width = hp + '%';
            enemies.splice(ei, 1);
            if(hp <= 0) location.reload();
        }
    });

    requestAnimationFrame(animate);
}

window.addEventListener('mousemove', e => {
    player.angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
});

window.addEventListener('mousedown', () => {
    if(isPaused) return;
    const now = Date.now();
    if(now - player.lastFire < player.fireRate) return;
    
    if(player.type === 'single') {
        bullets.push(new Bullet(player.x, player.y, player.angle, player.bounces, player.pierce));
    } else {
        bullets.push(new Bullet(player.x, player.y, player.angle, player.bounces, player.pierce));
        bullets.push(new Bullet(player.x, player.y, player.angle-0.2, player.bounces, player.pierce));
        bullets.push(new Bullet(player.x, player.y, player.angle+0.2, player.bounces, player.pierce));
    }
    player.lastFire = now;
});
</script>
</body>
</html>
